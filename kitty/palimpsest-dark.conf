# =============================================================================
# Palimpsest Dark — Grimoire variant (Phosphor Teal + Gold)
# Kitty terminal color theme
#
# Usage: add the following line to your kitty.conf:
#   include ~/.config/kitty/palimpsest-dark.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Font — Space Mono with ligatures disabled
# -----------------------------------------------------------------------------
font_family      Space Mono
bold_font        Space Mono Bold
italic_font      Space Mono Italic
bold_italic_font Space Mono Bold Italic
font_size        16.0

font_features SpaceMono-Regular    -liga -clig
font_features SpaceMono-Bold       -liga -clig
font_features SpaceMono-Italic     -liga -clig
font_features SpaceMono-BoldItalic -liga -clig

# -----------------------------------------------------------------------------
# Cursor — CRT green block
# -----------------------------------------------------------------------------
cursor                #64ff64
cursor_text_color     #0d1518
cursor_shape          block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# -----------------------------------------------------------------------------
# Colors
# -----------------------------------------------------------------------------

# Background & foreground
background  #0d1518
foreground  #19ffff

# Selection
selection_background  #4a1a8a
selection_foreground  #19ffff

# Black
color0  #0d1518
color8  #1a1720

# Red
color1  #ff3d71
color9  #ff6b9d

# Green
color2  #64ff64
color10 #a6ff4d

# Yellow / Gold
color3  #ffd866
color11 #ffe14d

# Blue / Teal
color4  #69b4ff
color12 #7fefff

# Magenta / Purple
color5  #df78ff
color13 #ff79c6

# Cyan
color6  #00ffcc
color14 #19ffff

# White / Gold
color7  #e5cd84
color15 #f6d49a

# -----------------------------------------------------------------------------
# URL style
# -----------------------------------------------------------------------------
url_color  #0baaba
url_style  curly

# -----------------------------------------------------------------------------
# Tab bar colors
# -----------------------------------------------------------------------------
tab_bar_edge             bottom
tab_bar_style            powerline
tab_powerline_style      slanted

active_tab_foreground    #19ffff
active_tab_background    #4a1a8a
active_tab_font_style    bold
inactive_tab_foreground  #0baaba
inactive_tab_background  #141e22
inactive_tab_font_style  normal
tab_bar_background       #0d1518
