# =============================================================================
# Palimpsest Dark — Sway / SwayFX color configuration
#
# Usage: add the following line to your sway config:
#   include ~/.config/sway/palimpsest-colors.conf
#
# Requires SwayFX for shadow support. On plain Sway, remove the
# shadows/shadow_* lines.
# =============================================================================

# Titlebar font — Alegreya Sans at 16pt
font pango:Alegreya Sans 16

# Window border colors — Palimpsest Grimoire dark
# format: border  background  text     indicator  child_border
client.focused          #4a1a8a #141e22 #19ffff  #0baaba   #4a1a8a
client.focused_inactive #1a1720 #0d1518 #637c87  #0d1518   #1a1720
client.unfocused        #0d1518 #0d1518 #4d6470  #0d1518   #0d1518
client.urgent           #ff3d71 #ff3d71 #ffffff  #ff3d71   #ff3d71

# SwayFX — purple CRT shadow
shadows           enable
shadow_blur_radius 28
shadow_color      #2d0a5acc
shadow_offset     3 5
